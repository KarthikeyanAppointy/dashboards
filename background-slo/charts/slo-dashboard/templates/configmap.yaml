apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "slo-dashboard.fullname" . }}
  labels:
    {{- include "slo-dashboard.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.configmap.PORT | default "8080" | quote }}
  FRONTEND_DIR: {{ .Values.configmap.FRONTEND_DIR | default "/app/frontend" | quote }}
  DEFAULT_TENANT_NAME: {{ .Values.configmap.DEFAULT_TENANT_NAME | default "Default" | quote }}
  DEFAULT_DOMAIN_ID: {{ .Values.configmap.DEFAULT_DOMAIN_ID | default "" | quote }}
  DEFAULT_DOMAIN_NAME: {{ .Values.configmap.DEFAULT_DOMAIN_NAME | default "unknown" | quote }}
  DEFAULT_ES: {{ .Values.configmap.DEFAULT_ES | default "http://localhost:9000" | quote }}
  DEFAULT_INDEX: {{ .Values.configmap.DEFAULT_INDEX | default "cadence-visibility" | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.configmap.GOOGLE_CLIENT_ID | default "" | quote }}
