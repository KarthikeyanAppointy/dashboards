apiVersion: v1
kind: Secret
metadata:
  name: {{ include "slo-dashboard.fullname" . }}-secret
  labels:
    {{- include "slo-dashboard.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $dburl := .Values.secret.DATABASE_URL }}
  {{- if not $dburl }}
    {{- $dburl = printf "postgres://postgres:postgres@%s-postgresql:5432/slo_dashboard?sslmode=disable" .Release.Name }}
  {{- end }}
  DATABASE_URL: {{ $dburl | b64enc | quote }}
